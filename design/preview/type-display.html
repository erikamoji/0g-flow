<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Display type</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; }
  body { background: var(--bg-0); }
  .card { padding: 24px 28px; box-sizing: border-box; }
  .row { display: flex; gap: 16px; align-items: stretch; }
  .col { display: flex; flex-direction: column; gap: 8px; }
  .label { font: var(--t-eyebrow); color: var(--fg-3); letter-spacing: 0.14em; text-transform: uppercase; }
  .hex { font: var(--t-num); color: var(--fg-3); font-size: 11px; }
  .name { font: 500 12px/1.2 var(--font-sans); color: var(--fg-1); }
  
  .stack { display: flex; flex-direction: column; gap: 14px; }
  .h0 { font: 600 56px/1.05 var(--font-sans); color: var(--fg-1); letter-spacing: -0.02em; margin: 0; }
  .h1 { font: var(--t-h1); color: var(--fg-1); margin: 0; }
  .h2 { font: var(--t-h2); color: var(--fg-1); margin: 0; }
  .meta { display: flex; gap: 14px; }
  .meta span { font: var(--t-num); color: var(--fg-3); }

</style>
</head>
<body>
<div class="card">
  <div class="stack">
    <h1 class="h0">Compose, visually.</h1>
    <div class="meta"><span>display · 56/1.05 · -0.02em</span><span>Inter Tight 600</span></div>
    <h2 class="h1">Job receipt · run-2k4f</h2>
    <div class="meta"><span>h1 · 32/1.15</span><span>Inter Tight 600</span></div>
  </div>
</div></body></html>
