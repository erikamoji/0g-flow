<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Mono / data</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; }
  body { background: var(--bg-0); }
  .card { padding: 24px 28px; box-sizing: border-box; }
  .row { display: flex; gap: 16px; align-items: stretch; }
  .col { display: flex; flex-direction: column; gap: 8px; }
  .label { font: var(--t-eyebrow); color: var(--fg-3); letter-spacing: 0.14em; text-transform: uppercase; }
  .hex { font: var(--t-num); color: var(--fg-3); font-size: 11px; }
  .name { font: 500 12px/1.2 var(--font-sans); color: var(--fg-1); }
  
  .stack { display: flex; flex-direction: column; gap: 14px; background: var(--bg-1); border: 1px solid var(--line-2); border-radius: 10px; padding: 18px; }
  .row { display: flex; justify-content: space-between; align-items: baseline; gap: 24px; }
  .row .l { color: var(--fg-3); font: var(--t-eyebrow); letter-spacing: 0.14em; }
  .row .v { color: var(--fg-1); font: var(--t-num); }
  .row .v.tx { color: var(--input-300); }
  .meta-foot { font: var(--t-meta); color: var(--fg-3); padding-top: 10px; border-top: 1px solid var(--line-1); }

</style>
</head>
<body>
<div class="card">
  <div class="stack">
    <div class="row"><span class="l">tx hash</span><span class="v tx">0x4f3a · 9c12 · b27c</span></div>
    <div class="row"><span class="l">block</span><span class="v">2,481,902</span></div>
    <div class="row"><span class="l">duration</span><span class="v">2.4s · 380ms ttft</span></div>
    <div class="row"><span class="l">cost</span><span class="v">0.0042 ETH · 1,240 gas</span></div>
    <div class="meta-foot">JETBRAINS MONO · 500 · 0.12em TRACKING ON LABELS</div>
  </div>
</div></body></html>
