<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Eyebrows + tags</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; }
  body { background: var(--bg-0); }
  .card { padding: 24px 28px; box-sizing: border-box; }
  .row { display: flex; gap: 16px; align-items: stretch; }
  .col { display: flex; flex-direction: column; gap: 8px; }
  .label { font: var(--t-eyebrow); color: var(--fg-3); letter-spacing: 0.14em; text-transform: uppercase; }
  .hex { font: var(--t-num); color: var(--fg-3); font-size: 11px; }
  .name { font: 500 12px/1.2 var(--font-sans); color: var(--fg-1); }
  
  .row { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; }
  .eyebrow { font: var(--t-eyebrow); letter-spacing: 0.14em; text-transform: uppercase; color: var(--fg-3); }
  .tag { font: var(--t-eyebrow); letter-spacing: 0.14em; text-transform: uppercase; padding: 5px 10px; border-radius: 4px; border: 1px solid var(--line-2); background: var(--bg-1); color: var(--fg-2); }
  .tag.input { color:#6FB1FF; border-color: rgba(111,177,255,0.3); background: rgba(42,123,255,0.08); }
  .tag.logic { color:#B49AFF; border-color: rgba(180,154,255,0.3); background: rgba(124,92,255,0.10); }
  .tag.anchor { color:#5DE3A5; border-color: rgba(93,227,165,0.3); background: rgba(16,185,129,0.10); }
  .stack { display: flex; flex-direction: column; gap: 14px; }

</style>
</head>
<body>
<div class="card">
  <div class="stack">
    <div class="row">
      <span class="eyebrow">GALILEO TESTNET</span>
      <span class="eyebrow">·</span>
      <span class="eyebrow">v0.1</span>
      <span class="eyebrow">·</span>
      <span class="eyebrow">CHAIN ID 16601</span>
    </div>
    <div class="row">
      <span class="tag input">INPUT</span>
      <span class="tag logic">LOGIC</span>
      <span class="tag anchor">ANCHOR</span>
      <span class="tag">DRAFT</span>
      <span class="tag">SEALED</span>
    </div>
  </div>
</div></body></html>
