<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Radii</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; }
  body { background: var(--bg-0); }
  .card { padding: 24px 28px; box-sizing: border-box; }
  .row { display: flex; gap: 16px; align-items: stretch; }
  .col { display: flex; flex-direction: column; gap: 8px; }
  .label { font: var(--t-eyebrow); color: var(--fg-3); letter-spacing: 0.14em; text-transform: uppercase; }
  .hex { font: var(--t-num); color: var(--fg-3); font-size: 11px; }
  .name { font: 500 12px/1.2 var(--font-sans); color: var(--fg-1); }
  
  .grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 10px; }
  .tile { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .box { width: 64px; height: 64px; background: var(--bg-3); border: 1px solid var(--line-3); }

</style>
</head>
<body>
<div class="card">
  <div class="grid">
    <div class="tile"><div class="box" style="border-radius:3px"></div><span class="label">xs</span><span class="hex">3</span></div>
    <div class="tile"><div class="box" style="border-radius:6px"></div><span class="label">sm</span><span class="hex">6</span></div>
    <div class="tile"><div class="box" style="border-radius:8px"></div><span class="label">md</span><span class="hex">8</span></div>
    <div class="tile"><div class="box" style="border-radius:10px"></div><span class="label">lg</span><span class="hex">10</span></div>
    <div class="tile"><div class="box" style="border-radius:14px"></div><span class="label">xl</span><span class="hex">14</span></div>
    <div class="tile"><div class="box" style="border-radius:20px"></div><span class="label">2xl</span><span class="hex">20</span></div>
  </div>
</div></body></html>
