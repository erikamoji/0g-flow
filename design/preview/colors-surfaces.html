<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Surfaces</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; }
  body { background: var(--bg-0); }
  .card { padding: 24px 28px; box-sizing: border-box; }
  .row { display: flex; gap: 16px; align-items: stretch; }
  .col { display: flex; flex-direction: column; gap: 8px; }
  .label { font: var(--t-eyebrow); color: var(--fg-3); letter-spacing: 0.14em; text-transform: uppercase; }
  .hex { font: var(--t-num); color: var(--fg-3); font-size: 11px; }
  .name { font: 500 12px/1.2 var(--font-sans); color: var(--fg-1); }
  
  .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; }
  .tile { aspect-ratio: 1.6 / 1; border-radius: 10px; border: 1px solid var(--line-2); padding: 12px; display: flex; flex-direction: column; justify-content: space-between; }

</style>
</head>
<body>
<div class="card">
  <div class="grid">
    <div class="tile" style="background:#07090C"><span class="label">bg-0</span><span class="hex">#07090C</span></div>
    <div class="tile" style="background:#0C1117"><span class="label">bg-1</span><span class="hex">#0C1117</span></div>
    <div class="tile" style="background:#131922"><span class="label">bg-2</span><span class="hex">#131922</span></div>
    <div class="tile" style="background:#1B2230"><span class="label">bg-3</span><span class="hex">#1B2230</span></div>
    <div class="tile" style="background:#232C3C"><span class="label">bg-4</span><span class="hex">#232C3C</span></div>
  </div>
</div></body></html>
