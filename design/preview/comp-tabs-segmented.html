<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Tabs / segmented</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; }
  body { background: var(--bg-0); }
  .card { padding: 24px 28px; box-sizing: border-box; }
  .row { display: flex; gap: 16px; align-items: stretch; }
  .col { display: flex; flex-direction: column; gap: 8px; }
  .label { font: var(--t-eyebrow); color: var(--fg-3); letter-spacing: 0.14em; text-transform: uppercase; }
  .hex { font: var(--t-num); color: var(--fg-3); font-size: 11px; }
  .name { font: 500 12px/1.2 var(--font-sans); color: var(--fg-1); }
  
  .stack { display: flex; flex-direction: column; gap: 14px; }
  .tabs { display: inline-flex; gap: 0; padding: 4px; background: var(--bg-1); border: 1px solid var(--line-2); border-radius: 8px; width: fit-content; }
  .tab { font: 500 12px/1 var(--font-sans); padding: 7px 12px; border-radius: 6px; color: var(--fg-2); cursor: pointer; }
  .tab.active { background: var(--bg-3); color: var(--fg-1); box-shadow: 0 1px 0 rgba(255,255,255,0.04) inset, 0 1px 2px rgba(0,0,0,0.4); }
  .nav-tabs { display: flex; gap: 18px; border-bottom: 1px solid var(--line-2); }
  .nt { font: 500 13px/1 var(--font-sans); padding: 12px 0; color: var(--fg-3); border-bottom: 1px solid transparent; margin-bottom: -1px; cursor: pointer; }
  .nt.active { color: var(--fg-1); border-color: var(--input-500); }

</style>
</head>
<body>
<div class="card">
  <div class="stack">
    <div class="tabs">
      <span class="tab active">Receipt</span>
      <span class="tab">Logs</span>
      <span class="tab">JSON</span>
      <span class="tab">Trace</span>
    </div>
    <div class="nav-tabs">
      <span class="nt active">Compose</span>
      <span class="nt">Runs</span>
      <span class="nt">Manifests</span>
      <span class="nt">Settings</span>
    </div>
  </div>
</div></body></html>
