<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Icon set</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; }
  body { background: var(--bg-0); }
  .card { padding: 24px 28px; box-sizing: border-box; }
  .row { display: flex; gap: 16px; align-items: stretch; }
  .col { display: flex; flex-direction: column; gap: 8px; }
  .label { font: var(--t-eyebrow); color: var(--fg-3); letter-spacing: 0.14em; text-transform: uppercase; }
  .hex { font: var(--t-num); color: var(--fg-3); font-size: 11px; }
  .name { font: 500 12px/1.2 var(--font-sans); color: var(--fg-1); }
  
  .grid { display: grid; grid-template-columns: repeat(8, 1fr); gap: 12px; }
  .tile { display: flex; flex-direction: column; align-items: center; gap: 8px; padding: 12px 4px; border: 1px solid var(--line-1); border-radius: 8px; background: var(--bg-1); color: var(--fg-2); }
  .tile img { width: 22px; height: 22px; filter: brightness(1.6); }
  .tile span { font: var(--t-eyebrow); letter-spacing: 0.10em; color: var(--fg-3); font-size: 9.5px; }

</style>
</head>
<body>
<div class="card">
  <div class="grid">
    <div class="tile"><img src="../assets/icons/node-input.svg" alt=""><span>node-input</span></div><div class="tile"><img src="../assets/icons/node-logic.svg" alt=""><span>node-logic</span></div><div class="tile"><img src="../assets/icons/node-anchor.svg" alt=""><span>node-anchor</span></div><div class="tile"><img src="../assets/icons/play.svg" alt=""><span>play</span></div><div class="tile"><img src="../assets/icons/pause.svg" alt=""><span>pause</span></div><div class="tile"><img src="../assets/icons/deploy.svg" alt=""><span>deploy</span></div><div class="tile"><img src="../assets/icons/terminal.svg" alt=""><span>terminal</span></div><div class="tile"><img src="../assets/icons/wallet.svg" alt=""><span>wallet</span></div><div class="tile"><img src="../assets/icons/copy.svg" alt=""><span>copy</span></div><div class="tile"><img src="../assets/icons/external-link.svg" alt=""><span>external-link</span></div><div class="tile"><img src="../assets/icons/gear.svg" alt=""><span>gear</span></div><div class="tile"><img src="../assets/icons/search.svg" alt=""><span>search</span></div><div class="tile"><img src="../assets/icons/plus.svg" alt=""><span>plus</span></div><div class="tile"><img src="../assets/icons/lock-sealed.svg" alt=""><span>lock-sealed</span></div><div class="tile"><img src="../assets/icons/database.svg" alt=""><span>database</span></div><div class="tile"><img src="../assets/icons/link-chain.svg" alt=""><span>link-chain</span></div>
  </div>
</div></body></html>
